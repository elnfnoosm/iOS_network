# This is a basic workflow to help you get started with Actions

name: Rule_Generate

on:
  schedule:
    - cron: '0 20 * * *'
  
  # Triggers the workflow on push or pull request events but only for the "main" branch
  pull_request:
    branches: [ "main" ]
    
  repository_dispatch:
    types: [bot_trigger]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # 避免权限冲突，更稳定

      - name: Print current directory
        run: |
          cd ./rule/
          pwd

      - name: "拉取"
        run: python rule/Script/Get_File.py

      - name: "合并"
        run: python rule/Script/Merge_File.py

      # 🔥 修复：只有文件变化才提交，无变化不报错
      - name: Commit files
        run: |
          git config --local user.email "wwfnle@gmail.com"
          git config --local user.name "elnfnoosm"
          git add ./*
          # 关键修复：无文件可提交时不返回错误码
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Rules"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GIT_TOKEN }}
          branch: ${{ github.ref }}
