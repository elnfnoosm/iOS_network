name: Rule_Generate

on:
  schedule:
    - cron: '0 20 * * *'
  pull_request:
    branches: [ "main" ]
  repository_dispatch:
    types: [bot_trigger]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_TOKEN }}  # 🔥 这里注入正确的 token

      - name: Print current directory
        run: |
          cd ./rule/
          pwd

      - name: "拉取"
        run: python rule/Script/Get_File.py

      - name: "合并"
        run: python rule/Script/Merge_File.py

      - name: Commit files
        run: |
          git config --local user.email "wwfnle@gmail.com"
          git config --local user.name "elnfnoosm"
          git add ./*
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Rules"

      # 🔥 替换老的action，用原生git push，稳定不报错
      - name: Push changes
        run: |
          git push origin HEAD:main
